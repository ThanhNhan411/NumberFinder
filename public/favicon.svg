<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" filter="url(#shadow)" />
  
  <!-- Sky blue 1 -->
  <g transform="translate(130, 200) rotate(-15) scale(1.6)">
    <rect x="-45" y="-55" width="90" height="110" rx="20" fill="#bae6fd" stroke="#0ea5e9" stroke-width="6" />
    <text x="0" y="22" font-family="system-ui, sans-serif" font-weight="900" font-size="72" fill="#0284c7" text-anchor="middle">1</text>
  </g>
  
  <!-- Pink 2 -->
  <g transform="translate(380, 240) rotate(20) scale(1.6)">
    <rect x="-45" y="-55" width="90" height="110" rx="20" fill="#fbcfe8" stroke="#ec4899" stroke-width="6" />
    <text x="0" y="22" font-family="system-ui, sans-serif" font-weight="900" font-size="72" fill="#be185d" text-anchor="middle">2</text>
  </g>

  <!-- Orange 99 -->
  <g transform="translate(256, 360) rotate(-5) scale(1.8)">
    <rect x="-65" y="-55" width="130" height="110" rx="20" fill="#fed7aa" stroke="#f97316" stroke-width="6" />
    <text x="0" y="22" font-family="system-ui, sans-serif" font-weight="900" font-size="72" fill="#c2410c" text-anchor="middle">99</text>
  </g>
</svg>
